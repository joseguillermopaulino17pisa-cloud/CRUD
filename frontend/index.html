<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">
        <header>
            <h1>Gestor</h1>
            <p>Agrega la tarea:</p>
        </header>

        <div class="task-box">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Nueva tarea..." 
                autocomplete="off"
            >
            <button id="addBtn">+</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
